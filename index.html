<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓國旅遊消費回饋計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.plan-card { transition: all 0.3s ease; }</style>
</head>
<body class="bg-[#F9F0ED] min-h-screen p-4 md:p-8 font-sans text-[#567357]">
    <div class="max-w-6xl mx-auto space-y-6">
        <!-- 標題與匯率設定 -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-[#E58889]/20 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-[#567357] mb-2">🇰🇷 韓國旅遊消費回饋計算器</h1>
                <div class="flex items-center space-x-2">
                    <label class="text-sm font-medium text-[#567357]/80">目前設定匯率：1 韓元 = </label>
                    <input type="number" id="exchangeRate" value="0.024" step="0.001" class="w-24 p-1.5 border-2 border-[#567357]/20 rounded-lg text-center font-bold text-[#567357] focus:outline-none focus:border-[#E58889]" onchange="calculateAll()">
                    <span class="text-sm text-[#567357]/80">台幣</span>
                </div>
            </div>
        </div>

        <!-- 方案狀態區 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            <!-- 富邦好市多卡 -->
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-[#E58889]/20">
                <h3 class="font-bold text-lg text-[#567357]">富邦好市多卡</h3>
                <p id="fubonRemaining" class="text-xl font-black text-[#E58889] my-2">TWD 15,000</p>
                <p id="fubonDetail" class="text-xs text-[#567357]/80 leading-relaxed"></p>
            </div>
            <!-- 全支付 -->
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-[#E58889]/20">
                <h3 class="font-bold text-lg text-[#567357]">全支付</h3>
                <div id="pxpayDetail" class="text-xs text-[#567357]/80 mt-2 space-y-1"></div>
            </div>
        </div>

        <!-- 新增消費紀錄表單 -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-[#E58889]/20">
            <h2 class="text-xl font-bold text-[#567357] mb-4">新增消費紀錄</h2>
            <form id="expenseForm" onsubmit="addExpense(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="expName" placeholder="消費名稱" required class="p-2.5 border border-[#567357]/20 rounded-xl">
                <input type="number" id="expAmount" placeholder="金額" required class="p-2.5 border border-[#567357]/20 rounded-xl">
                <select id="expMethod" class="p-2.5 border border-[#567357]/20 rounded-xl">
                    <option value="fubon">富邦好市多</option>
                    <option value="pxpay">全支付</option>
                </select>
                <button type="submit" class="bg-[#567357] text-white font-bold p-3 rounded-xl">記一筆</button>
            </form>
        </div>
    </div>

    <script>
        let expenses = JSON.parse(localStorage.getItem('korea_expenses')) || [];

        function addExpense(e) {
            e.preventDefault();
            expenses.push({
                id: Date.now(),
                name: document.getElementById('expName').value,
                amount: parseFloat(document.getElementById('expAmount').value),
                method: document.getElementById('expMethod').value
            });
            localStorage.setItem('korea_expenses', JSON.stringify(expenses));
            document.getElementById('expenseForm').reset();
            calculateAll();
        }

        function calculateAll() {
            const rate = parseFloat(document.getElementById('exchangeRate').value);
            let fubonSpent = 0, pxAct12Spent = 0, pxNextSpent = 0;

            expenses.forEach(exp => {
                const twd = exp.amount * rate;
                if(exp.method === 'fubon') fubonSpent += twd;
                if(exp.method === 'pxpay') {
                    // 全支付邏輯：活動合併上限 1000, 將來銀行加碼上限 100
                    pxAct12Spent += Math.min(twd * 0.085, 1000); 
                    pxNextSpent += Math.min(twd * 0.05, 100);
                }
            });

            // 富邦：4% 加碼上限 600點 (需刷 600 / 0.04 = 15,000 TWD)
            const fubonLeft = Math.max(0, 15000 - fubonSpent);
            document.getElementById('fubonRemaining').innerText = `TWD ${fubonLeft.toLocaleString(undefined, {maximumFractionDigits:0})}`;
            document.getElementById('fubonDetail').innerHTML = `
                已累積刷卡: ${fubonSpent.toFixed(0)} TWD<br>
                <span class="font-bold text-[#E58889]">還可刷 ${fubonLeft.toFixed(0)} TWD 吃滿 4% 加碼</span>
            `;

            // 全支付
            const act12Left = 1000 - pxAct12Spent;
            const nextLeft = 100 - pxNextSpent;
            document.getElementById('pxpayDetail').innerHTML = `
                <p>活動(3.5%+5%): 剩 ${act12Left.toFixed(0)} 點<br>
                <span class="font-bold">還可刷 ${(act12Left / 0.085).toFixed(0)} TWD</span></p>
                <p class="mt-2">將來銀行: 剩 ${nextLeft.toFixed(0)} 點<br>
                <span class="font-bold">還可刷 ${(nextLeft / 0.05).toFixed(0)} TWD</span></p>
            `;
        }
        calculateAll();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓國旅遊消費回饋計算器 (Final Plan)</title>
    <!-- 使用 Tailwind CSS CDN 進行快速樣式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定義進度條動畫 */
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <!-- 標題與匯率設定區 -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">🇰🇷 韓國旅遊消費計算器</h1>
            <div class="flex items-center gap-3 bg-slate-100 p-2 rounded-full px-4 border border-slate-200">
                <label class="text-sm font-semibold text-slate-600">匯率設定：1 韓元 = </label>
                <input type="number" id="exchangeRate" value="0.024" step="0.001" class="w-24 p-1.5 border rounded-full text-center font-bold text-blue-600 bg-white" onchange="calculateAll()">
                <span class="text-sm font-semibold text-slate-600">台幣</span>
            </div>
        </div>

        <!-- 方案額度與回饋總覽卡片區 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- icash Pay 卡片 (第一順位小額) -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-3">
                <div class="flex justify-between items-start">
                    <span class="px-3 py-1 bg-purple-100 text-purple-800 text-xs font-bold rounded-full">15% 免手續費</span>
                    <span class="text-xs text-slate-500">上限 TWD 2,000</span>
                </div>
                <h3 class="font-bold text-xl text-slate-900">1. icash Pay (掃碼)</h3>
                <p class="text-3xl font-black text-purple-600 my-2" id="icashRemaining">TWD 2,000</p>
                <div class="w-full bg-slate-100 rounded-full h-2.5 border border-slate-200">
                    <div id="icashBar" class="bg-purple-600 h-2 rounded-full progress-bar" style="width: 100%"></div>
                </div>
                <p class="text-sm text-slate-600 pt-1" id="icashEarned">累積回饋: 0 OPENPOINT</p>
            </div>

            <!-- 全支付(綁將來) 卡片 (第二順位小額) -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-3">
                <div class="flex justify-between items-start">
                    <span class="px-3 py-1 bg-sky-100 text-sky-800 text-xs font-bold rounded-full">將來銀行加碼/免手續費</span>
                    <span class="text-xs text-slate-500">週上限~8.5%，月上限1000點</span>
                </div>
                <h3 class="font-bold text-xl text-slate-900">2. 全支付 (掃碼)</h3>
                <p class="text-3xl font-black text-sky-600 my-2" id="pxpayRemaining">TWD 1,000點額度</p>
                <div class="w-full bg-slate-100 rounded-full h-2.5 border border-slate-200">
                    <div id="pxpayBar" class="bg-sky-500 h-2 rounded-full progress-bar" style="width: 100%"></div>
                </div>
                <p class="text-sm text-slate-600 pt-1" id="pxpayEarned">累積回饋: 0 全點</p>
            </div>

            <!-- 富邦好市多卡 卡片 (大額實體卡) -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-3">
                <div class="flex justify-between items-start">
                    <span class="px-3 py-1 bg-amber-100 text-amber-900 text-xs font-bold rounded-full">5% 扣1.5%手續費</span>
                    <span class="text-xs text-slate-500">加碼上限 TWD 15,000</span>
                </div>
                <h3 class="font-bold text-xl text-slate-900">3. 富邦好市多卡 (實體)</h3>
                <p class="text-3xl font-black text-amber-600 my-2" id="fubonRemaining">TWD 15,000</p>
                <div class="w-full bg-slate-100 rounded-full h-2.5 border border-slate-200">
                    <div id="fubonBar" class="bg-amber-500 h-2 rounded-full progress-bar" style="width: 100%"></div>
                </div>
                <p class="text-sm text-slate-600 pt-1" id="fubonEarned">累積淨賺: 0 元好多金</p>
            </div>
        </div>

        <!-- 新增消費紀錄表單 -->
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
            <h2 class="text-xl font-bold text-slate-900 mb-6 flex items-center gap-2">➕ 記一筆新消費</h2>
            <form id="expenseForm" onsubmit="addExpense(event)" class="grid grid-cols-1 md:grid-cols-4 gap-5 items-end">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">消費項目名稱</label>
                    <input type="text" id="expName" placeholder="例如：大創購物、醫美診所" required class="w-full p-3 border rounded-xl bg-slate-50 border-slate-200 focus:ring-2 focus:ring-blue-200">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">幣別與金額</label>
                    <div class="flex">
                        <select id="expCurrency" class="p-3 border rounded-l-xl bg-slate-100 border-slate-200 text-sm font-medium">
                            <option value="KRW">KRW 韓元</option>
                            <option value="TWD">TWD 台幣</option>
                        </select>
                        <input type="number" id="expAmount" placeholder="金額" required class="w-full p-3 border rounded-r-xl bg-slate-50 border-slate-200 focus:ring-2 focus:ring-blue-200">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">支付方案 (依序選擇)</label>
                    <select id="expMethod" class="w-full p-3 border rounded-xl bg-slate-50 border-slate-200 text-sm font-medium focus:ring-2 focus:ring-blue-200">
                        <option value="icash">1. icash Pay (小額優先)</option>
                        <option value="pxpay">2. 全支付綁將來 (小額備用)</option>
                        <option value="fubon">3. 富邦好市多卡 (大額/實體)</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold p-3 rounded-xl hover:bg-blue-700 transition duration-150 shadow-sm shadow-blue-200">新增紀錄</button>
            </form>
        </div>

        <!-- 消費明細列表 -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="text-xl font-bold text-slate-900">📜 消費明細清單</h2>
                <button onclick="clearAll()" class="text-xs text-red-500 hover:text-red-700 hover:underline font-medium">清空所有紀錄</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-slate-600 text-sm font-semibold border-b border-slate-100">
                            <th class="p-5">項目</th>
                            <th class="p-5">原始金額</th>
                            <th class="p-5">折合台幣 (估)</th>
                            <th class="p-5">支付方案</th>
                            <th class="p-5">預計淨回饋</th>
                            <th class="p-5 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="expenseList" class="divide-y divide-slate-100 text-slate-700">
                        <!-- 動態插入紀錄 -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 初始化預設紀錄 (你提到的三筆消費)
        let expenses = [
            { id: 1, name: '吃飯', amount: 20000, currency: 'KRW', method: 'icash' },
            { id: 2, name: '購物', amount: 35000, currency: 'KRW', method: 'icash' },
            { id: 3, name: '醫美診所大單', amount: 800000, currency: 'KRW', method: 'fubon' }
        ];

        // 新增消費
        function addExpense(e) {
            e.preventDefault();
            const name = document.getElementById('expName').value;
            const amount = parseFloat(document.getElementById('expAmount').value);
            const currency = document.getElementById('expCurrency').value;
            const method = document.getElementById('expMethod').value;

            expenses.push({ id: Date.now(), name, amount, currency, method });
            document.getElementById('expenseForm').reset();
            calculateAll();
        }

        // 刪除消費
        function deleteExpense(id) {
            expenses = expenses.filter(exp => exp.id !== id);
            calculateAll();
        }

        // 清空所有
        function clearAll() {
            if(confirm('確定要清空所有紀錄嗎？(無法還原)')) {
                expenses = [];
                calculateAll();
            }
        }

        // 核心計算邏輯
        function calculateAll() {
            const rate = parseFloat(document.getElementById('exchangeRate').value) || 0.024;
            
            // 各方案上限定義 (台幣)
            const caps = { icash: 2000, pxpay: 1000, fubon: 15000 };
            const spending = { icash: 0, pxpay: 0, fubon: 0 };
            const rewards = { icash: 0, pxpay: 0, fubon: 0 };

            const listBody = document.getElementById('expenseList');
            listBody.innerHTML = '';

            expenses.forEach(exp => {
                // 1. 換算台幣金額 (四捨五入)
                const twdAmount = exp.currency === 'KRW' ? Math.round(exp.amount * rate) : exp.amount;
                spending[exp.method] += twdAmount;

                // 2. 計算單筆回饋與顯示文字
                let rewardText = '';
                let netRewardNum = 0;

                if (exp.method === 'icash') {
                    // icash 15%: 額度內給回饋
                    const validAmount = Math.max(0, twdAmount - Math.max(0, spending.icash - caps.icash));
                    const reward = Math.round(validAmount * 0.15);
                    rewards.icash += reward;
                    rewardText = `+${reward} OPENPOINT`;
                } else if (exp.method === 'pxpay') {
                    // 全支付(將來): 簡化邏輯，週2k內約8.5%，月上限1000點
                    // 檢查是否超過月總上限點數
                    const isWithinMonthly = (rewards.pxpay < caps.pxpay);
                    let rateUsed = (spending.pxpay <= 2000) ? 0.085 : 0.035; // 週2k Boost
                    
                    if (!isWithinMonthly) rateUsed = 0; // 超過月上限不給點

                    const reward = Math.round(twdAmount * rateUsed);
                    rewards.pxpay += reward;
                    // 確保不超過月上限
                    if(rewards.pxpay > caps.pxpay) {
                        const overflow = rewards.pxpay - caps.pxpay;
                        rewards.pxpay = caps.pxpay;
                        rewardText = `+${reward - overflow} 全點 (達月上限)`;
                    } else {
                        rewardText = `+${reward} 全點`;
                    }
                } else if (exp.method === 'fubon') {
                    // 富邦Costco: 實體卡5% (1%無上限+4%加碼 capped TWD 600 points on 15k spend) - 1.5%手續費
                    const validAmountForBonus = Math.max(0, twdAmount - Math.max(0, spending.fubon - caps.fubon));
                    const baseReward = Math.round(twdAmount * 0.01); // 1%無上限
                    const bonusReward = Math.round(validAmountForBonus * 0.04); // 4%加碼
                    const fee = Math.round(twdAmount * 0.015); // 1.5%海外手續費扣除
                    
                    const net = (baseReward + bonusReward) - fee;
                    rewards.fubon += net;
                    rewardText = `${net >= 0 ? '+' : ''}${net} 元好多金 (已扣手續費)`;
                }

                // 3. 渲染明細表格行
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition text-sm';
                tr.innerHTML = `
                    <td class="p-5 font-semibold text-slate-900">${exp.name}</td>
                    <td class="p-5">${exp.amount.toLocaleString()} ${exp.currency}</td>
                    <td class="p-5 font-bold text-slate-700">NT$ ${twdAmount.toLocaleString()}</td>
                    <td class="p-5"><span class="px-3 py-1 rounded-full text-xs font-bold ${
                        exp.method === 'icash' ? 'bg-purple-100 text-purple-800' : 
                        exp.method === 'pxpay' ? 'bg-sky-100 text-sky-800' : 'bg-amber-100 text-amber-900'
                    }">${exp.method === 'icash' ? 'icash Pay' : exp.method === 'pxpay' ? '全支付綁將來' : '富邦好市多'}</span></td>
                    <td class="p-5 font-semibold text-green-600">${rewardText}如果之前「導入跑不出來」，通常是因為 GitHub 預設只會認檔名叫做 **`index.html`** 的檔案作為首頁。

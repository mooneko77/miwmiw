<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓國旅遊消費回饋計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- 標題與匯率設定 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h1 class="text-2xl font-bold text-slate-800 mb-4">🇰🇷 韓國旅遊消費回饋計算器</h1>
            <div class="flex items-center space-x-2">
                <label class="text-sm font-medium text-slate-600">目前設定匯率：1 韓元 = </label>
                <input type="number" id="exchangeRate" value="0.024" step="0.001" class="w-20 p-1 border rounded text-center font-bold text-blue-600" onchange="calculateAll()">
                <span class="text-sm text-slate-600">台幣</span>
            </div>
        </div>

        <!-- 方案餘額與進度條 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- 全支付 -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-start mb-2">
                    <span class="px-2 py-1 bg-sky-100 text-sky-700 text-xs font-bold rounded">將來銀行加碼/免手續費</span>
                    <span class="text-xs text-slate-500">每月上限 TWD 1,000</span>
                </div>
                <h3 class="font-bold text-lg text-slate-800">全支付 (將來)</h3>
                <p class="text-2xl font-black text-sky-600 my-2" id="pxpayRemaining">TWD 1,000</p>
                <div class="w-full bg-slate-200 rounded-full h-2">
                    <div id="pxpayBar" class="bg-sky-500 h-2 rounded-full" style="width: 100%"></div>
                </div>
                <p class="text-xs text-slate-500 mt-2 text-right" id="pxpayEarned">已賺回饋: 0 點</p>
            </div>

            <!-- icash Pay -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-start mb-2">
                    <span class="px-2 py-1 bg-purple-100 text-purple-700 text-xs font-bold rounded">15% 免手續費</span>
                    <span class="text-xs text-slate-500">上限 TWD 2,000</span>
                </div>
                <h3 class="font-bold text-lg text-slate-800">icash Pay</h3>
                <p class="text-2xl font-black text-purple-600 my-2" id="icashRemaining">TWD 2,000</p>
                <div class="w-full bg-slate-200 rounded-full h-2">
                    <div id="icashBar" class="bg-purple-600 h-2 rounded-full" style="width: 100%"></div>
                </div>
                <p class="text-xs text-slate-500 mt-2 text-right" id="icashEarned">已賺: 0 點</p>
            </div>

            <!-- 富邦好市多卡 -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-start mb-2">
                    <span class="px-2 py-1 bg-amber-100 text-amber-700 text-xs font-bold rounded">5% 扣1.5%手續費</span>
                    <span class="text-xs text-slate-500">加碼上限 TWD 15,000</span>
                </div>
                <h3 class="font-bold text-lg text-slate-800">富邦好市多卡</h3>
                <p class="text-2xl font-black text-amber-600 my-2" id="fubonRemaining">TWD 15,000</p>
                <div class="w-full bg-slate-200 rounded-full h-2">
                    <div id="fubonBar" class="bg-amber-500 h-2 rounded-full" style="width: 100%"></div>
                </div>
                <p class="text-xs text-slate-500 mt-2 text-right" id="fubonEarned">淨賺: 0 元</p>
            </div>
        </div>

        <!-- 新增消費紀錄 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold text-slate-800 mb-4">➕ 新增消費紀錄</h2>
            <form id="expenseForm" onsubmit="addExpense(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">消費名稱</label>
                    <input type="text" id="expName" placeholder="例如：吃飯、大創、醫美" required class="w-full p-2 border rounded-xl">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">幣別與金額</label>
                    <div class="flex">
                        <select id="expCurrency" class="p-2 border rounded-l-xl bg-slate-50">
                            <option value="KRW">KRW 韓元</option>
                            <option value="TWD">TWD 台幣</option>
                        </select>
                        <input type="number" id="expAmount" placeholder="金額" required class="w-full p-2 border rounded-r-xl">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">支付方式</label>
                    <select id="expMethod" class="w-full p-2 border rounded-xl bg-slate-50">
                        <option value="pxpay">全支付 (將來銀行)</option>
                        <option value="icash">icash Pay (15%)</option>
                        <option value="fubon">富邦好市多卡 (5%)</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold p-2 rounded-xl hover:bg-blue-700 transition">記一筆</button>
            </form>
        </div>

        <!-- 消費歷史紀錄列表 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-800">📜 消費明細</h2>
                <button onclick="clearAll()" class="text-xs text-red-500 hover:underline">全部清空</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 text-sm font-medium border-b border-slate-100">
                            <th class="p-4">項目</th>
                            <th class="p-4">原始金額</th>
                            <th class="p-4">折合台幣</th>
                            <th class="p-4">支付管道</th>
                            <th class="p-4">估計淨回饋</th>
                            <th class="p-4 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="expenseList" class="divide-y divide-slate-100 text-slate-700">
                        <!-- 動態插入 -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 初始化預設包含你的三筆花費
        let expenses = [
            { id: 1, name: '吃飯', amount: 20000, currency: 'KRW', method: 'icash' },
            { id: 2, name: '購物', amount: 35000, currency: 'KRW', method: 'icash' },
            { id: 3, name: '醫美', amount: 800000, currency: 'KRW', method: 'fubon' }
        ];

        function addExpense(e) {
            e.preventDefault();
            const name = document.getElementById('expName').value;
            const amount = parseFloat(document.getElementById('expAmount').value);
            const currency = document.getElementById('expCurrency').value;
            const method = document.getElementById('expMethod').value;

            expenses.push({ id: Date.now(), name, amount, currency, method });
            document.getElementById('expenseForm').reset();
            calculateAll();
        }

        function deleteExpense(id) {
            expenses = expenses.filter(exp => exp.id !== id);
            calculateAll();
        }

        function clearAll() {
            if(confirm('確定要清空所有紀錄嗎？')) {
                expenses = [];
                calculateAll();
            }
        }

        function calculateAll() {
            const rate = parseFloat(document.getElementById('exchangeRate').value) || 0.024;
            
            // 基礎參數
            const caps = { pxpay: 1000, icash: 2000, fubon: 15000 };
            const spending = { pxpay: 0, icash: 0, fubon: 0 };
            const rewards = { pxpay: 0, icash: 0, fubon: 0 };

            const listBody = document.getElementById('expenseList');
            listBody.innerHTML = '';

            expenses.forEach(exp => {
                const twdAmount = exp.currency === 'KRW' ? Math.round(exp.amount * rate) : exp.amount;
                spending[exp.method] += twdAmount;

                let rewardText = '';
                if (exp.method === 'pxpay') {
                    // 全支付：基本+將來銀行加碼在2k內約8.5%
                    const isWithinWeekly = (spending.pxpay <= 2000);
                    const rateUsed = isWithinWeekly ? 0.085 : 0.035;
                    const reward = Math.round(twdAmount * rateUsed);
                    rewards.pxpay += reward;
                    rewardText = `+${reward} 全點`;
                } else if (exp.method === 'icash') {
                    const validAmount = Math.max(0, twdAmount - Math.max(0, spending.icash - caps.icash));
                    const reward = Math.round(validAmount * 0.15);
                    rewards.icash += reward;
                    rewardText = `+${reward} OPENPOINT`;
                } else if (exp.method === 'fubon') {
                    const validAmount = Math.max(0, twdAmount - Math.max(0, spending.fubon - caps.fubon));
                    const base = Math.round(twdAmount * 0.01);
                    const bonus = Math.round(validAmount * 0.04);
                    const fee = Math.round(twdAmount * 0.015);
                    const net = (base + bonus) - fee;
                    rewards.fubon += net;
                    rewardText = `${net >= 0 ? '+' : ''}${net} 元 (含手續費)`;
                }

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition text-sm';
                tr.innerHTML = `
                    <td class="p-4 font-medium text-slate-900">${exp.name}</td>
                    <td class="p-4">${exp.amount.toLocaleString()} ${exp.currency}</td>
                    <td class="p-4 font-semibold text-slate-600">NT$ ${twdAmount.toLocaleString()}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs font-bold ${
                        exp.method === 'pxpay' ? 'bg-sky-100 text-sky-700' : 
                        exp.method === 'icash' ? 'bg-purple-100 text-purple-700' : 'bg-amber-100 text-amber-700'
                    }">${exp.method === 'pxpay' ? '全支付' : exp.method === 'icash' ? 'icash Pay' : '富邦好市多'}</span></td>
                    <td class="p-4 font-medium text-green-600">${rewardText}</td>
                    <td class="p-4 text-center"><button onclick="deleteExpense(${exp.id})" class="text-red-400 hover:text-red-600">刪除</button></td>
                `;
                listBody.appendChild(tr);
            });

            // 更新剩餘額度進度條
            // 全支付
            const pxpayLeft = Math.max(0, 12000 - spending.pxpay); // 粗估極限消費額
            document.getElementById('pxpayRemaining').innerText = `已刷 TWD ${spending.pxpay.toLocaleString()}`;
            document.getElementById('pxpayBar').style.width = `${Math.min(100, (spending.pxpay / 12000) * 100)}%`;
            document.getElementById('pxpayEarned').innerText = `已賺: ${rewards.pxpay} 點`;

            // icash
            const icashLeft = Math.max(0, caps.icash - spending.icash);
            document.getElementById('icashRemaining').innerText = `TWD ${icashLeft.toLocaleString()}`;
            document.getElementById('icashBar').style.width = `${(icashLeft / caps.icash) * 100}%`;
            document.getElementById('icashEarned').innerText = `已賺: ${rewards.icash} 點`;

            // 富邦好市多
            const fubonLeft = Math.max(0, caps.fubon - spending.fubon);
            document.getElementById('fubonRemaining').innerText = `TWD ${fubonLeft.toLocaleString()}`;
            document.getElementById('fubonBar').style.width = `${(fubonLeft / caps.fubon) * 100}%`;
            document.getElementById('fubonEarned').innerText = `累積淨賺: ${rewards.fubon} 元`;
        }

        calculateAll();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>遠策財富管理有限公司 | Yuance Wealth Management</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts: Noto Serif TC for Classical Feel -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        /* 自定義金色漸層與古典風格 */
        :root {
            --color-gold-main: #D4AF37;
            --color-gold-light: #F9E498;
            --color-gold-dark: #AA771C;
            --color-deep-red: #7A0C0C;
            --color-dark-brown: #1B1B1B;
            --font-serif: 'Noto Serif TC', serif;
            --font-sans: 'Noto Sans TC', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: #f5f0e6; /* 米色底，仿畫布 */
            color: var(--color-dark-brown);
            overflow-x: hidden;
        }

        h1, h2, h3, .classical-font {
            font-family: var(--font-serif);
        }

        /* 華麗金色漸層文字/邊框 */
        .text-gradient-gold {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .bg-gradient-gold {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        .border-gradient-gold {
            border: 2px solid;
            border-image-source: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728);
            border-image-slice: 1;
        }

        /* 隱藏滾動條但保持功能 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 卡片玻璃擬態與陰影 */
        .card-shadow {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
        }

        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--color-gold-main);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Firebase Configuration ---
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = window.__app_id || 'default-app';
        
        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- INTERNAL ICON SYSTEM (Fix for CDN issues) ---
        const CreateIcon = ({ path, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {path}
            </svg>
        );

        // Icon Definitions (Lucide style)
        const Home = (props) => <CreateIcon {...props} path={<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>} />;
        const Building2 = (props) => <CreateIcon {...props} path={<><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></>} />;
        const ShieldCheck = (props) => <CreateIcon {...props} path={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></>} />;
        const Star = (props) => <CreateIcon {...props} path={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>} />;
        const Newspaper = (props) => <CreateIcon {...props} path={<><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></>} />;
        const Briefcase = (props) => <CreateIcon {...props} path={<><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>} />;
        const Users = (props) => <CreateIcon {...props} path={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />;
        const Crown = (props) => <CreateIcon {...props} path={<path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/>} />;
        const Medal = (props) => <CreateIcon {...props} path={<><path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15"/><path d="M11 12 5.12 2.2"/><path d="m13 12 5.88-9.8"/><circle cx="12" cy="19" r="5"/><path d="m8 17 8 4"/><path d="m8 21 8-4"/></>} />;
        const Globe = (props) => <CreateIcon {...props} path={<><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></>} />;
        const MapPin = (props) => <CreateIcon {...props} path={<><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>} />;
        const Trash2 = (props) => <CreateIcon {...props} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>} />;
        const Menu = (props) => <CreateIcon {...props} path={<><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></>} />;
        
        // --- Components ---

        // 1. Navigation Icon Item
        const NavItem = ({ icon: Icon, label, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`flex flex-col items-center justify-center min-w-[72px] p-2 transition-all duration-300 ${active ? 'scale-110' : 'opacity-80'}`}
            >
                <div className={`p-3 rounded-full mb-1 border-2 shadow-lg backdrop-blur-sm ${active ? 'bg-gradient-gold border-white text-yellow-900' : 'bg-black/40 border-yellow-500/50 text-yellow-200'}`}>
                    <Icon size={20} />
                </div>
                <span className={`text-[10px] font-bold tracking-wide ${active ? 'text-white text-shadow-md' : 'text-yellow-100/80'}`}>
                    {label}
                </span>
            </button>
        );

        // 2. Section Title
        const SectionTitle = ({ title, subtitle }) => (
            <div className="mb-6 text-center">
                <h2 className="text-2xl font-bold text-[#7A0C0C] classical-font mb-1 flex items-center justify-center gap-2">
                    <span className="h-[1px] w-8 bg-yellow-600"></span>
                    {title}
                    <span className="h-[1px] w-8 bg-yellow-600"></span>
                </h2>
                {subtitle && <p className="text-xs text-gray-500 uppercase tracking-widest">{subtitle}</p>}
            </div>
        );

        // 3. Card Component
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-xl card-shadow overflow-hidden border border-yellow-100 ${className}`}>
                {children}
            </div>
        );

        // --- Main Application ---
        const App = () => {
            const [activeTab, setActiveTab] = React.useState('home');
            const [lang, setLang] = React.useState('zh-TW');
            const [user, setUser] = React.useState(null);
            const [isAdmin, setIsAdmin] = React.useState(false); // Toggle for demo
            
            // Data States (Mock + Firestore)
            const [news, setNews] = React.useState([]);
            const [photos, setPhotos] = React.useState([]);
            const [products, setProducts] = React.useState([]);
            const [loading, setLoading] = React.useState(false);

            // Auth Effect
            React.useEffect(() => {
                const initAuth = async () => {
                   if (window.__initial_auth_token) {
                       await auth.signInWithCustomToken(window.__initial_auth_token);
                   } else {
                       await auth.signInAnonymously();
                   }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            // Data Fetching Effect (Real-time updates)
            React.useEffect(() => {
                if (!user) return;
                
                // Fetch News
                const unsubNews = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('news')
                    .orderBy('date', 'desc')
                    .onSnapshot(snap => {
                        const list = snap.docs.map(d => ({id: d.id, ...d.data()}));
                        if(list.length > 0) setNews(list);
                        else {
                            // Initial seed data if empty
                            setNews([
                                { id: '1', title: '遠策受邀參加2026亞洲金融論壇', date: '2026-01-15', type: 'event', image: 'https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&q=80&w=400' },
                                { id: '2', title: '美聯儲最新利率決策分析', date: '2026-01-10', type: 'news', image: 'https://images.unsplash.com/photo-1611974765270-ca1258634369?auto=format&fit=crop&q=80&w=400' }
                            ]);
                        }
                    }, err => console.log(err));

                 // Fetch Products
                const unsubProds = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products')
                    .onSnapshot(snap => {
                         const list = snap.docs.map(d => ({id: d.id, ...d.data()}));
                         if(list.length > 0) setProducts(list);
                         else {
                             setProducts([
                                 { id: '1', name: '尊榮世代傳承信託', tag: '熱銷', desc: '專為高淨值家族設計的財富傳承方案。' },
                                 { id: '2', name: '環球醫療金卡', tag: '推薦', desc: '全球頂級醫療資源對接，全額理賠。' }
                             ]);
                         }
                    }, err => console.log(err));
                
                return () => { unsubNews(); unsubProds(); };
            }, [user]);

            // CRUD Operations
            const addItem = async (collection, data) => {
                if (!user) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(collection).add(data);
                } catch (e) { console.error(e); }
            };

            const deleteItem = async (collection, id) => {
                if (!user) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(collection).doc(id).delete();
                } catch (e) { console.error(e); }
            };

            // Translation Map
            const t = {
                'zh-TW': {
                    tabs: {
                        home: '首頁', group: '集團簡介', agency: '保險代理', products: '熱銷產品', 
                        news: '最新消息', family: '家族辦公室', partners: '合作夥伴', member: '會員專區', awards: '得獎紀錄'
                    },
                    sections: {
                        events: '近期活動 & 新聞',
                        rates: '世界匯率',
                        gallery: '企業參訪',
                        vision: '企業願景',
                        partners: '合作夥伴',
                        contact: '聯絡我們'
                    }
                }
            }[lang];

            // Render Content Based on Tab
            const renderContent = () => {
                switch(activeTab) {
                    case 'home': return <HomeTab />;
                    case 'group': return <GroupTab />;
                    case 'agency': return <AgencyTab />;
                    case 'products': return <ProductsTab />;
                    case 'news': return <NewsTab />;
                    case 'family': return <FamilyTab />;
                    case 'partners': return <PartnersTab />;
                    case 'awards': return <AwardsTab />;
                    default: return <HomeTab />;
                }
            };

            // --- Sub-Components for Tabs ---

            const HomeTab = () => (
                <div className="space-y-8 animate-fade-in pb-20">
                    
                    {/* Rate Widget (Mock) */}
                    <section className="px-4">
                        <Card className="p-4 bg-gradient-to-br from-gray-50 to-gray-100">
                            <div className="flex justify-between items-center mb-3">
                                <h3 className="font-bold text-[#7A0C0C] flex items-center gap-2">
                                    <Globe size={18} /> {t.sections.rates}
                                </h3>
                                <span className="text-[10px] text-gray-500">來源: 台灣銀行 (延遲)</span>
                            </div>
                            <div className="grid grid-cols-3 gap-2 text-center text-sm">
                                <div className="p-2 bg-white rounded shadow-sm">
                                    <div className="text-gray-500 text-xs">USD/TWD</div>
                                    <div className="font-bold text-green-700">32.45</div>
                                </div>
                                <div className="p-2 bg-white rounded shadow-sm">
                                    <div className="text-gray-500 text-xs">HKD/TWD</div>
                                    <div className="font-bold text-green-700">4.15</div>
                                </div>
                                <div className="p-2 bg-white rounded shadow-sm">
                                    <div className="text-gray-500 text-xs">CNY/TWD</div>
                                    <div className="font-bold text-red-700">4.48</div>
                                </div>
                            </div>
                        </Card>
                    </section>

                    {/* News & Events */}
                    <section className="px-4">
                        <SectionTitle title="焦點新聞" subtitle="NEWS & EVENTS" />
                        
                        {isAdmin && (
                            <div className="mb-4 p-3 border-2 border-dashed border-yellow-400 rounded bg-yellow-50">
                                <p className="text-xs font-bold mb-2">管理員新增新聞:</p>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const title = e.target.title.value;
                                    if(title) addItem('news', { title, date: new Date().toISOString().split('T')[0], type: 'news', image: 'https://placehold.co/400x200?text=News' });
                                    e.target.reset();
                                }} className="flex gap-2">
                                    <input name="title" placeholder="輸入標題..." className="flex-1 p-2 text-sm border rounded" />
                                    <button type="submit" className="bg-[#7A0C0C] text-white px-3 py-1 rounded text-xs">新增</button>
                                </form>
                            </div>
                        )}

                        <div className="space-y-4">
                            {news.map((item) => (
                                <Card key={item.id} className="flex flex-row h-24 relative">
                                    <div className="w-24 h-full bg-gray-200 shrink-0">
                                        <img src={item.image} alt="news" className="w-full h-full object-cover" onError={(e) => e.target.src='https://placehold.co/100x100?text=Yuance'} />
                                    </div>
                                    <div className="p-3 flex flex-col justify-center flex-1">
                                        <div className="flex items-center gap-2 mb-1">
                                            <span className={`text-[10px] px-2 py-0.5 rounded text-white ${item.type === 'event' ? 'bg-[#7A0C0C]' : 'bg-yellow-600'}`}>
                                                {item.type === 'event' ? '活動' : '新聞'}
                                            </span>
                                            <span className="text-[10px] text-gray-400">{item.date}</span>
                                        </div>
                                        <h4 className="text-sm font-bold line-clamp-2 leading-snug">{item.title}</h4>
                                    </div>
                                    {isAdmin && (
                                        <button onClick={() => deleteItem('news', item.id)} className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full w-6 h-6 flex items-center justify-center shadow">
                                            <Trash2 size={12} />
                                        </button>
                                    )}
                                </Card>
                            ))}
                        </div>
                    </section>

                     {/* Visit Gallery */}
                     <section className="px-4">
                        <SectionTitle title="參訪紀實" subtitle="CORPORATE VISITS" />
                        <div className="flex overflow-x-auto gap-3 pb-4 hide-scrollbar snap-x">
                            {[1,2,3].map(i => (
                                <div key={i} className="snap-center shrink-0 w-64 h-40 rounded-xl overflow-hidden relative card-shadow">
                                    <img src={`https://images.unsplash.com/photo-1541535650810-10d26f5c2ab3?auto=format&fit=crop&q=80&w=400&text=Visit+${i}`} className="w-full h-full object-cover" />
                                    <div className="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black/80 to-transparent p-3">
                                        <p className="text-white text-sm font-bold">企業參訪 - 第 {i} 站</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );

            const GroupTab = () => (
                <div className="px-4 space-y-6 pb-20">
                     <div className="relative p-6 bg-[#1B1B1B] rounded-xl text-yellow-100 text-center border border-yellow-600/30">
                        <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-[#7A0C0C] p-2 rounded-full border-4 border-[#1B1B1B]">
                            <Crown size={24} className="text-yellow-400" />
                        </div>
                        <h3 className="mt-4 text-xl font-bold classical-font text-gradient-gold mb-2">企業願景</h3>
                        <p className="text-sm opacity-80 leading-relaxed">
                            立足香港，放眼全球。<br/>成為亞洲最值得信賴的家族財富管家。
                        </p>
                    </div>

                    <div className="space-y-4">
                        <SectionTitle title="服務項目" />
                        <div className="grid grid-cols-2 gap-3">
                            {['家族信託', '稅務規劃', '全球置產', '保險規劃'].map((s, i) => (
                                <div key={i} className="bg-white p-4 rounded-lg text-center shadow-sm border-b-2 border-yellow-500">
                                    <div className="w-10 h-10 bg-yellow-50 rounded-full flex items-center justify-center mx-auto mb-2 text-[#7A0C0C]">
                                        <Star size={20} />
                                    </div>
                                    <h4 className="font-bold text-gray-800">{s}</h4>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const AgencyTab = () => (
                <div className="px-4 pb-20">
                    <SectionTitle title="保險代理" subtitle="OUR PARTNERS" />
                    <p className="text-center text-sm text-gray-500 mb-6">嚴選全球頂尖 16 家合作夥伴，為您提供最優質的保障。</p>
                    <div className="grid grid-cols-4 gap-4">
                        {Array.from({length: 16}).map((_, i) => (
                            <div key={i} className="aspect-square bg-white rounded-lg flex items-center justify-center p-2 shadow-sm border border-gray-100">
                                <div className="text-xs text-center text-gray-400 font-bold">LOGO<br/>{i+1}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const ProductsTab = () => (
                <div className="px-4 space-y-4 pb-20">
                     <SectionTitle title="熱銷產品" subtitle="HOT PRODUCTS" />
                     {isAdmin && (
                        <div className="mb-4 p-3 bg-yellow-50 rounded border-dashed border-2 border-yellow-300">
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const name = e.target.name.value;
                                if(name) addItem('products', { name, tag: 'NEW', desc: '新上市產品' });
                                e.target.reset();
                            }} className="flex gap-2">
                                <input name="name" placeholder="產品名稱" className="flex-1 p-2 rounded text-sm border" />
                                <button className="bg-[#7A0C0C] text-white px-3 rounded text-xs">Add</button>
                            </form>
                        </div>
                     )}
                     
                     {products.map(p => (
                         <Card key={p.id} className="p-0 flex flex-col relative">
                             <div className="h-2 bg-gradient-gold w-full"></div>
                             <div className="p-5">
                                 <div className="absolute top-4 right-4 bg-red-600 text-white text-[10px] px-2 py-1 rounded-full font-bold shadow-md">
                                     {p.tag}
                                 </div>
                                 <h3 className="text-lg font-bold text-[#1B1B1B] mb-2">{p.name}</h3>
                                 <p className="text-sm text-gray-600 mb-4">{p.desc}</p>
                                 <button className="w-full py-2 border border-[#7A0C0C] text-[#7A0C0C] rounded hover:bg-[#7A0C0C] hover:text-white transition text-sm font-bold">
                                     了解更多
                                 </button>
                             </div>
                             {isAdmin && <button onClick={() => deleteItem('products', p.id)} className="absolute bottom-2 right-2 text-red-500"><Trash2 size={16}/></button>}
                         </Card>
                     ))}
                </div>
            );

            const PartnersTab = () => (
                <div className="px-4 pb-20 text-center">
                    <SectionTitle title="策略夥伴" />
                    <Card className="p-8 flex flex-col items-center justify-center gap-4">
                        <div className="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 font-bold text-xl border-4 border-yellow-500">
                            巨石
                        </div>
                        <h3 className="text-xl font-bold">巨石人壽保險公司</h3>
                        <p className="text-sm text-gray-500">Titan Stone Life</p>
